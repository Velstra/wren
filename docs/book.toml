[book]
title = "The Wren Handbook"
authors = ["The Wren authors"]
description = "Documentation for Wren — a routing daemon in Rust."
language = "en"
src = "src"

[output.html]
default-theme = "navy"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/velstra/wren"
edit-url-template = "https://github.com/velstra/wren/edit/main/docs/{path}"
additional-css = ["theme/wren.css"]

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
